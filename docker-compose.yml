services:
  backend-db:
    image: postgres:16
    environment:
      POSTGRES_DB: analysis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - backend_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d analysis"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build: ./backend
    environment:
      BACKEND_DATABASE_URL: postgresql+psycopg://postgres:postgres@backend-db:5432/analysis
      BACKEND_JWT_SECRET: local-dev-secret
      BACKEND_BOOTSTRAP_ADMIN_EMAIL: admin@example.com
      BACKEND_BOOTSTRAP_ADMIN_PASSWORD: admin12345
      BACKEND_S3_ENDPOINT_URL: http://minio:9000
      BACKEND_S3_REGION: us-east-1
      BACKEND_S3_ACCESS_KEY_ID: minioadmin
      BACKEND_S3_SECRET_ACCESS_KEY: minioadmin
      BACKEND_S3_BUCKET_NAME: uploads
      BACKEND_CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    ports:
      - "8050:8050"
    depends_on:
      backend-db:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8050/health', timeout=3).read()"]
      interval: 5s
      timeout: 3s
      retries: 30

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_ORCHESTRATOR_URL: http://localhost:8050/api/v1
      VITE_AUTH_URL: http://localhost:8050/api/v1
      VITE_STORAGE_URL: http://localhost:8050/api/v1
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 30

volumes:
  backend_db_data:
  minio_data:
  frontend_node_modules:
