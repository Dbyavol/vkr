<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#eef6ff"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f766e"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4b5563"/>
    </marker>
    <style>
      .title { font: 700 36px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px 'Segoe UI', Arial, sans-serif; fill: #475569; }
      .section { font: 700 20px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box-title { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .box-text { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .small { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1400" height="860" rx="36" fill="url(#bg)"/>
  <text x="70" y="72" class="title">Архитектура Разработанной Информационно-Аналитической Системы</text>
  <text x="70" y="106" class="subtitle">Микросервисная схема, реализованная в ходе преддипломной практики</text>

  <rect x="70" y="150" width="1260" height="640" rx="30" fill="#ffffff" stroke="#dbe7f3" stroke-width="2"/>

  <text x="120" y="196" class="section">Пользовательский Контур</text>
  <rect x="110" y="222" width="260" height="140" rx="24" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2" filter="url(#shadow)"/>
  <rect x="136" y="248" width="208" height="46" rx="16" fill="url(#blue)"/>
  <text x="240" y="278" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Frontend</text>
  <text x="136" y="320" class="box-text">• Многоэтапный web-интерфейс</text>
  <text x="136" y="346" class="box-text">• Выбор датасета и критериев</text>
  <text x="136" y="372" class="box-text">• Визуализация результатов</text>

  <text x="440" y="196" class="section">Слой Координации</text>
  <rect x="410" y="222" width="290" height="140" rx="24" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <rect x="438" y="248" width="234" height="46" rx="16" fill="url(#green)"/>
  <text x="555" y="278" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">Orchestrator Service</text>
  <text x="438" y="320" class="box-text">• Единая точка входа API</text>
  <text x="438" y="346" class="box-text">• Связка сервисов по pipeline</text>
  <text x="438" y="372" class="box-text">• Формирование отчетов</text>

  <text x="770" y="196" class="section">Прикладные Сервисы</text>
  <rect x="750" y="222" width="220" height="120" rx="22" fill="#eefcf7" stroke="#99f6e4" stroke-width="2" filter="url(#shadow)"/>
  <text x="780" y="260" class="box-title">Import Service</text>
  <text x="780" y="290" class="box-text">Парсинг CSV/XLSX/JSON</text>
  <text x="780" y="316" class="box-text">Нормализация полей</text>

  <rect x="995" y="222" width="250" height="120" rx="22" fill="#eefcf7" stroke="#99f6e4" stroke-width="2" filter="url(#shadow)"/>
  <text x="1025" y="260" class="box-title">Preprocessing Service</text>
  <text x="1025" y="290" class="box-text">Профилирование данных</text>
  <text x="1025" y="316" class="box-text">Заполнение пропусков и энкодинг</text>

  <rect x="750" y="384" width="220" height="120" rx="22" fill="#eefcf7" stroke="#99f6e4" stroke-width="2" filter="url(#shadow)"/>
  <text x="780" y="422" class="box-title">Analysis Service</text>
  <text x="780" y="452" class="box-text">Метод взвешенных коэффициентов</text>
  <text x="780" y="478" class="box-text">Ранжирование и поиск аналогов</text>

  <rect x="995" y="384" width="250" height="120" rx="22" fill="#eefcf7" stroke="#99f6e4" stroke-width="2" filter="url(#shadow)"/>
  <text x="1025" y="422" class="box-title">Auth Service</text>
  <text x="1025" y="452" class="box-text">Регистрация и аутентификация</text>
  <text x="1025" y="478" class="box-text">Роли и личный кабинет</text>

  <text x="440" y="560" class="section">Слой Хранения</text>
  <rect x="410" y="586" width="290" height="148" rx="24" fill="#fffdf3" stroke="#fcd34d" stroke-width="2" filter="url(#shadow)"/>
  <text x="440" y="626" class="box-title">Storage Service</text>
  <text x="440" y="656" class="box-text">• История сравнений и проекты</text>
  <text x="440" y="682" class="box-text">• Метаданные файлов и отчетов</text>
  <text x="440" y="708" class="box-text">• Доступ к данным для повторного расчета</text>

  <rect x="750" y="586" width="220" height="148" rx="24" fill="#fffdf3" stroke="#fcd34d" stroke-width="2" filter="url(#shadow)"/>
  <text x="780" y="626" class="box-title">PostgreSQL</text>
  <text x="780" y="656" class="box-text">Пользователи</text>
  <text x="780" y="682" class="box-text">История, проекты, отчеты</text>

  <rect x="995" y="586" width="250" height="148" rx="24" fill="#fffdf3" stroke="#fcd34d" stroke-width="2" filter="url(#shadow)"/>
  <text x="1025" y="626" class="box-title">S3 / MinIO</text>
  <text x="1025" y="656" class="box-text">Хранение исходных датасетов</text>
  <text x="1025" y="682" class="box-text">Хранение результатов и экспортов</text>

  <line x1="370" y1="292" x2="410" y2="292" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="700" y1="282" x2="750" y2="282" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="700" y1="310" x2="995" y2="310" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="700" y1="430" x2="750" y2="430" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="700" y1="458" x2="995" y2="458" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="555" y1="362" x2="555" y2="586" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="700" y1="640" x2="750" y2="640" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="700" y1="668" x2="995" y2="668" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="96" y="770" class="small">Рисунок 1 – Архитектура системы включает frontend, orchestrator, прикладные микросервисы, PostgreSQL и S3-хранилище.</text>
</svg>
