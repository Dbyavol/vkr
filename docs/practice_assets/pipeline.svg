<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="700" viewBox="0 0 1400 700">
  <defs>
    <linearGradient id="step" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.1"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#4b5563"/>
    </marker>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .step-title { font: 700 24px 'Segoe UI', Arial, sans-serif; fill: #0f172a; }
      .step-text { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334155; }
      .caption { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #475569; }
    </style>
  </defs>

  <rect width="1400" height="700" rx="34" fill="#f8fbff"/>
  <text x="70" y="72" class="title">Технологический Поток Сравнительного Анализа Объектов</text>

  <rect x="70" y="150" width="240" height="180" rx="28" fill="#ffffff" stroke="#d9e8ff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="96" y="176" width="188" height="48" rx="16" fill="url(#step)"/>
  <text x="190" y="208" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">1. Загрузка</text>
  <text x="96" y="258" class="step-text">Файл CSV/XLSX/JSON</text>
  <text x="96" y="286" class="step-text">Сохранение датасета в S3</text>
  <text x="96" y="314" class="step-text">Построение предпросмотра</text>

  <rect x="360" y="150" width="280" height="180" rx="28" fill="#ffffff" stroke="#d9e8ff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="388" y="176" width="224" height="48" rx="16" fill="url(#step)"/>
  <text x="500" y="208" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">2. Предобработка</text>
  <text x="388" y="258" class="step-text">Типизация признаков</text>
  <text x="388" y="286" class="step-text">Пропуски, выбросы, энкодинг</text>
  <text x="388" y="314" class="step-text">Оценка качества датасета</text>

  <rect x="690" y="150" width="280" height="180" rx="28" fill="#ffffff" stroke="#d9e8ff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="718" y="176" width="224" height="48" rx="16" fill="url(#step)"/>
  <text x="830" y="208" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">3. Настройка</text>
  <text x="718" y="258" class="step-text">Выбор режима анализа</text>
  <text x="718" y="286" class="step-text">Выбор целевого объекта</text>
  <text x="718" y="314" class="step-text">Критерии и веса</text>

  <rect x="1020" y="150" width="300" height="180" rx="28" fill="#ffffff" stroke="#d9e8ff" stroke-width="2" filter="url(#shadow)"/>
  <rect x="1048" y="176" width="244" height="48" rx="16" fill="url(#step)"/>
  <text x="1170" y="208" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#ffffff">4. Анализ</text>
  <text x="1048" y="258" class="step-text">Нормализация значений</text>
  <text x="1048" y="286" class="step-text">Применение метода взвешенных коэффициентов</text>
  <text x="1048" y="314" class="step-text">Ранжирование и поиск аналогов</text>

  <rect x="250" y="420" width="360" height="170" rx="28" fill="#ffffff" stroke="#c7f9e9" stroke-width="2" filter="url(#shadow)"/>
  <text x="284" y="466" class="step-title">5. Представление Результатов</text>
  <text x="284" y="500" class="step-text">• Bar chart и детальная карточка выбранного объекта</text>
  <text x="284" y="528" class="step-text">• Пояснение результата и вклад критериев</text>
  <text x="284" y="556" class="step-text">• Сводка надежности и групп аналогов</text>

  <rect x="720" y="420" width="420" height="170" rx="28" fill="#ffffff" stroke="#f5d0fe" stroke-width="2" filter="url(#shadow)"/>
  <text x="754" y="466" class="step-title">6. Сохранение И Повторное Использование</text>
  <text x="754" y="500" class="step-text">• Сохранение параметров сравнения в историю</text>
  <text x="754" y="528" class="step-text">• Повторный запуск сценария без повторной загрузки данных</text>
  <text x="754" y="556" class="step-text">• Экспорт отчетов в JSON, HTML, PDF и DOCX</text>

  <line x1="310" y1="240" x2="360" y2="240" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="640" y1="240" x2="690" y2="240" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="970" y1="240" x2="1020" y2="240" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1170" y1="330" x2="1170" y2="420" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="1020" y1="505" x2="610" y2="505" stroke="#4b5563" stroke-width="3" marker-end="url(#arrow)"/>

  <text x="70" y="648" class="caption">Рисунок 2 – Поток обработки данных: от загрузки и предобработки до аналитики, визуализации и сохранения результатов.</text>
</svg>
